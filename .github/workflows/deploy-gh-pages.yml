name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VITE_BACKEND_PROVIDER: ${{ vars.VITE_BACKEND_PROVIDER }}
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_BILLING_API_BASE_URL: ${{ vars.VITE_BILLING_API_BASE_URL }}
      VITE_MP_CHECKOUT_FAMILIA_PLUS: ${{ vars.VITE_MP_CHECKOUT_FAMILIA_PLUS }}
      VITE_MP_CHECKOUT_GESTAO_PLUS: ${{ vars.VITE_MP_CHECKOUT_GESTAO_PLUS }}
      VITE_MP_CHECKOUT_MARKETPLACE_FLEX: ${{ vars.VITE_MP_CHECKOUT_MARKETPLACE_FLEX }}
      VITE_MP_CHECKOUT_MARKETPLACE_PRO: ${{ vars.VITE_MP_CHECKOUT_MARKETPLACE_PRO }}
      VITE_MP_CHECKOUT_ANUNCIO_STANDARD: ${{ vars.VITE_MP_CHECKOUT_ANUNCIO_STANDARD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      - name: Publish
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
